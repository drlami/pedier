kind = "web"
previewPath = "/"
title = "PMC PediER Aid"
version = "1.0.0"
id = "artifacts/pmc-pedier-aid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20275

[services.development]
run = "pnpm --filter @workspace/pmc-pedier-aid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pmc-pedier-aid", "run", "build" ]
publicDir = "artifacts/pmc-pedier-aid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20275"
BASE_PATH = "/"
