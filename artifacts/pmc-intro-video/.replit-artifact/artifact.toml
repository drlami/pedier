kind = "video"
previewPath = "/pmc-intro-video/"
title = "PMC PediER Aid — Introduction Video"
version = "1.0.0"
id = "artifacts/pmc-intro-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pmc-intro-video/" ]
localPort = 22401

[services.development]
run = "pnpm --filter @workspace/pmc-intro-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pmc-intro-video", "run", "build" ]
publicDir = "artifacts/pmc-intro-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22401"
BASE_PATH = "/pmc-intro-video/"
