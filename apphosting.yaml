# Firebase App Hosting configuration for PMC PediER Aid (Pedier booklet app)
#
# Deployment workflow:
#   Replit edits → git push origin main → Firebase App Hosting auto-rollout
#
# Setup steps (one-time in Firebase Console):
#   1. Connect this GitHub repo (https://github.com/drlami/pedier) to App Hosting
#   2. Set the live branch to "main"
#   3. Add each secret listed below via Firebase Console → App Hosting → Secrets
#      (or via: firebase apphosting:secrets:set NEXT_PUBLIC_FIREBASE_API_KEY)

scripts:
  # Build only the Pedier app from the pnpm monorepo root.
  # Firebase App Hosting installs dependencies automatically before this runs.
  buildCommand: pnpm --filter @workspace/pmc-pedier-aid run build

runConfig:
  runtime: nodejs20
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # ── Build-time env vars ──────────────────────────────────────────────────
  # These are baked into the Vite bundle at build time (NEXT_PUBLIC_ prefix).
  # Add each as a Firebase Secret Manager secret before the first deploy.

  - variable: BASE_PATH
    value: /
    availability:
      - BUILD

  - variable: NODE_ENV
    value: production
    availability:
      - BUILD

  # ── Pedier Firebase Realtime Database config ─────────────────────────────
  # These must be added as secrets in Firebase Console (App Hosting → Secrets).

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    secret: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
